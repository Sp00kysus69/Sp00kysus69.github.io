<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sp00kyStraight69</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: 'Lora', Georgia, serif;
    color: white;
    background: #0a0a0a;
    min-height: 100vh;
}
header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid #2a2a2a;
}
header h1 {
    margin: 0;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #f0e8d8;
}
.main {
    display: grid;
    grid-template-columns: 1fr 2fr;
    grid-template-areas: "about video" "social video";
    gap: 80px;
    max-width: 1300px;
    margin: 60px auto;
    padding: 0 60px;
    align-items: start;
}
.about {
    grid-area: about;
    text-align: left;
    padding-right: 20px;
}
.social {
    grid-area: social;
    text-align: left;
    padding-right: 20px;
}
.video-section {
    grid-area: video;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}
iframe {
    width: 100%;
    max-width: 800px;
    height: 450px;
    border: none;
    border-radius: 4px;
}
h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 10px 0;
    color: #e8dcc8;
    letter-spacing: 0.02em;
}
.video-section h2 {
    margin-bottom: 16px;
}
p {
    font-family: 'Lora', Georgia, serif;
    font-size: 15px;
    line-height: 1.75;
    color: #b0a898;
    margin: 0 0 8px 0;
}
section {
    margin-bottom: 36px;
}
a {
    color: #c8aa80;
    text-decoration: none;
    border-bottom: 1px solid #c8aa8055;
    transition: border-color 0.2s, color 0.2s;
}
a:hover {
    color: #e8c898;
    border-bottom-color: #e8c898;
}
footer {
    text-align: left;
    padding: 20px 60px;
    color: #444;
    font-family: 'Lora', Georgia, serif;
    font-size: 13px;
    font-style: italic;
    border-top: 1px solid #1a1a1a;
}

@media (max-width: 900px) {
    .main {
        grid-template-columns: 1fr;
        grid-template-areas: "about" "video" "social";
        gap: 40px;
        padding: 0 24px;
        margin: 40px auto;
    }
    .about,
    .social {
        padding-right: 0;
    }
    .video-section {
        align-items: center;
    }
    iframe {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
    }
    footer {
        padding: 20px 24px;
    }
}

@media (max-width: 600px) {
    header {
        padding: 28px 16px 20px;
    }
    header h1 {
        font-size: 24px;
        line-height: 1.3;
    }
    .main {
        gap: 32px;
        padding: 0 18px;
        margin: 30px auto;
    }
    .about,
    .social {
        text-align: left;
        align-items: flex-start;
    }
    .video-section {
        text-align: center;
        align-items: center;
    }
    h2 {
        font-size: 18px;
    }
    p {
        font-size: 14px;
        line-height: 1.65;
    }
    section {
        margin-bottom: 26px;
    }
    iframe {
        width: 88%;
        margin: 0 auto;
        border-radius: 2px;
    }
    footer {
        padding: 16px 18px;
        font-size: 12px;
    }
}

@media (max-width: 360px) {
    header h1 {
        font-size: 21px;
    }
    .main {
        padding: 0 14px;
    }
}
</style>
</head>
<body>
<header>
    <h1>Welcome to my website</h1>
</header>
<div class="main">
    <div class="about">
        <section>
            <h2>About Me</h2>
            <p>I'm a YouTuber who has been making FNF covers and visualizers since 2024.</p>
            <p>Different covers will be coming some day not sure when lol.</p>
        </section>
    </div>
    <div class="video-section">
        <h2>Latest Video</h2>
        <iframe src="https://www.youtube.com/embed/vdm4cGe73Bo" allowfullscreen></iframe>
    </div>
    <div class="social">
        <section>
            <h2>Social Media's I have</h2>
            <p><a href="https://www.youtube.com/@Sp00kyStraight69" target="_blank">My YouTube channel</a></p>
            <p><a href="https://x.com/Sp00kyStraight" target="_blank">My X account</a></p>
        </section>
    </div>
</div>
</body>
</html>
